<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Эльгария — Тёмное Время</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Philosopher:ital,wght@0,400;0,700;1,400&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0b0a0f;
            background-image: radial-gradient(circle at 30% 10%, #1f1b2c, #0b0a0f);
            min-height: 100vh;
            font-family: 'Philosopher', serif;
            color: #e0d6c2;
            padding: 20px 20px 50px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .particles {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none; z-index: 0;
        }
        .particle {
            position: absolute;
            width: 3px; height: 3px;
            background: #c9a84c;
            border-radius: 50%;
            opacity: 0;
            animation: floatUp 8s infinite;
            box-shadow: 0 0 8px #c9a84c, 0 0 15px #c9a84c80;
        }
        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0.5); opacity: 0; }
            10% { opacity: 0.8; }
            30% { transform: translateY(70vh) translateX(20px) scale(1); opacity: 0.6; }
            60% { transform: translateY(30vh) translateX(-20px) scale(0.8); opacity: 0.4; }
            100% { transform: translateY(-10vh) scale(0.2); opacity: 0; }
        }
        .fog {
            position: fixed; top: 0; left: 0;
            width: 100%; height: 100%;
            background: radial-gradient(ellipse at 50% 80%, rgba(201, 168, 76, 0.05) 0%, transparent 60%);
            z-index: 0; pointer-events: none;
        }

        .main-tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: nowrap;
            justify-content: center;
            position: relative;
            z-index: 2;
        }
        .main-tab {
            background: #1a1426;
            color: #8b7b6b;
            border: 1px solid #5e4a3c;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.85rem;
            transition: all 0.25s ease;
            white-space: nowrap;
        }
        .main-tab.active {
            background: #2a1f3a;
            color: #c9a84c;
            border-color: #c9a84c;
            box-shadow: 0 0 10px #c9a84c40;
            transform: scale(1.02);
        }

        .panel {
            display: block;
            width: 100%;
            max-width: 600px;
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(8px);
            pointer-events: none;
            height: 0;
            overflow: hidden;
            transition: opacity 0.35s ease, transform 0.35s ease;
        }
        .panel.active {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
            height: auto;
            overflow: visible;
        }

        .gen-title {
            font-size: 2.2rem; color: #c9a84c;
            text-shadow: 0 0 15px #c9a84c80;
            letter-spacing: 3px; margin-bottom: 5px; text-align: center;
        }
        .gen-subtitle { color: #8b7b6b; font-style: italic; margin-bottom: 20px; text-align: center; }
        .gen-btn {
            background: linear-gradient(145deg, #1a1426, #2a1f3a);
            color: #c9a84c; border: 1px solid #5e4a3c;
            padding: 14px 35px; font-size: 1.2rem; font-weight: bold;
            border-radius: 50px; cursor: pointer; letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(0,0,0,0.8), 0 0 15px #c9a84c40;
            transition: all 0.25s ease; margin-bottom: 25px;
            font-family: 'Philosopher', sans-serif;
        }
        .gen-btn:hover { background: #2d2342; border-color: #c9a84c; box-shadow: 0 5px 25px #c9a84c70; }
        .card {
            background: rgba(18, 15, 26, 0.9); backdrop-filter: blur(12px);
            border: 1px solid #5e4a3c; border-radius: 25px; padding: 25px 20px;
            box-shadow: 0 15px 30px rgba(0,0,0,0.7), inset 0 0 30px #c9a84c10;
            text-align: left; opacity: 0; transform: scale(0.95);
            transition: opacity 0.4s ease, transform 0.4s ease; pointer-events: none;
        }
        .card.visible { opacity: 1; transform: scale(1); pointer-events: auto; }
        .field { margin-bottom: 16px; border-bottom: 1px dashed #3a2f2a; padding-bottom: 10px; }
        .field:last-of-type { border-bottom: none; }
        .label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8b7b6b; margin-bottom: 4px; }
        .value { font-size: 1.1rem; color: #e0d6c2; line-height: 1.4; }

        .ref-title {
            color: #c9a84c;
            text-shadow: 0 0 10px #c9a84c80;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-align: center;
            font-size: 1.4rem;
        }
        .ref-subtitle { color: #8b7b6b; font-style: italic; margin-bottom: 15px; text-align: center; font-size: 0.8rem; }
        .section-tabs {
            display: flex; justify-content: center; gap: 12px; margin-bottom: 15px;
        }
        .section-tab {
            background: #1a1426; color: #8b7b6b;
            border: 1px solid #5e4a3c; padding: 6px 16px;
            border-radius: 20px; cursor: pointer;
            font-family: inherit; font-size: 0.8rem; transition: all 0.25s ease;
        }
        .section-tab.active {
            background: #2a1f3a; color: #c9a84c;
            border-color: #c9a84c; box-shadow: 0 0 8px #c9a84c40;
        }
        .tabs { display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; margin-bottom: 20px; }
        .tab {
            background: #1a1426; color: #8b7b6b;
            border: 1px solid #5e4a3c; padding: 5px 10px;
            border-radius: 14px; cursor: pointer;
            font-family: inherit; font-size: 0.7rem; transition: all 0.25s ease;
        }
        .tab.active {
            background: #2a1f3a; color: #c9a84c;
            border-color: #c9a84c; box-shadow: 0 0 6px #c9a84c40;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 10px; width: 100%;
        }
        .ref-card {
            background: rgba(18, 15, 26, 0.8); border: 1px solid #5e4a3c;
            border-radius: 14px; padding: 12px 6px; text-align: center;
            cursor: pointer; transition: all 0.25s ease;
        }
        .ref-card:hover, .ref-card:active {
            border-color: #c9a84c; box-shadow: 0 0 12px #c9a84c40;
            background: #1f1b2c;
        }
        .portrait {
            width: 60px; height: 60px; border-radius: 50%;
            margin: 0 auto 8px; background: #2a1f3a;
            display: flex; align-items: center; justify-content: center;
            font-size: 2rem; line-height: 1; border: 2px solid #5e4a3c;
            overflow: hidden;
        }
        .portrait img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .portrait span { font-size: 1.5rem; color: #c9a84c; }
        .ref-name { font-size: 0.8rem; font-weight: bold; color: #c9a84c; margin-bottom: 3px; }
        .ref-role { font-size: 0.65rem; color: #8b7b6b; }

        .quest-panel { text-align: center; }
        .quest-region-select {
            margin-bottom: 20px;
            background: #1a1426; color: #c9a84c;
            border: 1px solid #5e4a3c;
            padding: 8px 16px; border-radius: 20px;
            font-family: inherit; font-size: 0.9rem;
            cursor: pointer;
        }
        .quest-list {
            display: flex; flex-direction: column; gap: 12px;
        }
        .quest-card {
            background: rgba(18, 15, 26, 0.8);
            border: 1px solid #5e4a3c;
            border-radius: 14px; padding: 14px;
            text-align: left;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .quest-card:hover { border-color: #c9a84c; box-shadow: 0 0 8px #c9a84c20; }
        .quest-title { color: #c9a84c; font-size: 0.95rem; margin-bottom: 4px; }
        .quest-desc { color: #e0d6c2; font-size: 0.8rem; margin-bottom: 4px; }
        .quest-reward { color: #8b7b6b; font-size: 0.7rem; font-style: italic; }
        .quest-location { color: #c9a84c; font-size: 0.7rem; margin-top: 4px; }

        .modal-overlay {
            display: none; position: fixed;
            top:0; left:0; right:0; bottom:0;
            background: rgba(0,0,0,0.8); backdrop-filter: blur(5px);
            z-index: 100; justify-content: center; align-items: center; padding: 20px;
        }
        .modal-overlay.open { display:flex; }
        .modal {
            background: #0f0c1a; border: 1px solid #c9a84c;
            border-radius: 20px; max-width: 360px; width: 100%;
            padding: 20px; position: relative;
            box-shadow: 0 0 40px #000; animation: fadeScale 0.3s ease;
        }
        @keyframes fadeScale { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
        .modal .close {
            position: absolute; top: 10px; right: 14px;
            font-size: 1.8rem; color: #8b7b6b; cursor: pointer; transition: 0.3s;
        }
        .modal .close:hover { color: #c9a84c; }
        .modal .portrait-large {
            width: 90px; height: 90px; border-radius: 50%;
            margin: 0 auto 12px; background: #2a1f3a;
            display: flex; align-items: center; justify-content: center;
            font-size: 3rem; line-height: 1; border: 2px solid #c9a84c;
            overflow: hidden;
        }
        .modal .portrait-large img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        .modal .portrait-large span { font-size: 2.5rem; color: #c9a84c; }
        .modal h2 { text-align: center; color: #c9a84c; margin-bottom: 5px; font-size: 1.2rem; }
        .modal .subtitle { color: #8b7b6b; font-style: italic; margin-bottom: 12px; text-align: center; font-size: 0.85rem; }
        .modal .description { font-size: 0.85rem; line-height: 1.5; white-space: pre-wrap; color: #e0d6c2; }

        @media (max-width: 400px) {
            .main-tab { padding: 6px 10px; font-size: 0.75rem; }
            .gen-title { font-size: 1.8rem; }
            .gen-subtitle { font-size: 0.8rem; }
            .ref-title { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="fog"></div>

<div class="main-tabs">
    <div class="main-tab active" data-panel="generator">Персонаж</div>
    <div class="main-tab" data-panel="reference">Власть и влияние</div>
    <div class="main-tab" data-panel="quests">Задания</div>
</div>

<!-- Панель генератора -->
<div class="panel active" id="generatorPanel">
    <h1 class="gen-title">Эльгария</h1>
    <div class="gen-subtitle">Тёмное Время · Генератор судеб</div>
    <button class="gen-btn" onclick="generateCharacter()">Призвать персонажа</button>
    <div class="card" id="characterCard">
        <div class="field"><div class="label">ФИО</div><div class="value" id="fio"></div></div>
        <div class="field"><div class="label">Происхождение</div><div class="value" id="origin"></div></div>
        <div class="field"><div class="label">Народность</div><div class="value" id="race"></div></div>
        <div class="field"><div class="label">Владение магией</div><div class="value" id="magic"></div></div>
        <div class="field"><div class="label">Принадлежность</div><div class="value" id="affiliation"></div></div>
        <div class="field"><div class="label">Умения</div><div class="value" id="skills"></div></div>
        <div class="field"><div class="label">Характер</div><div class="value" id="character"></div></div>
        <div class="field"><div class="label">Место появления</div><div class="value" id="spawnLocation"></div></div>
    </div>
</div>

<!-- Панель справочника -->
<div class="panel" id="referencePanel">
    <h1 class="ref-title">Власть и Влияние</h1>
    <div class="ref-subtitle">Действующие лица Эльгарии</div>
    <div class="section-tabs" id="sectionTabBar">
        <div class="section-tab active" data-section="empire">Империя</div>
        <div class="section-tab" data-section="mordeyn">Мордейн</div>
    </div>
    <div class="tabs" id="tabBar"></div>
    <div class="grid" id="cardGrid"></div>
</div>

<!-- Панель заданий -->
<div class="panel" id="questsPanel">
    <h1 class="gen-title">Задания</h1>
    <div class="gen-subtitle">Выберите регион, чтобы увидеть доступные задания</div>
    <div class="quest-panel">
        <select class="quest-region-select" id="questRegionSelect">
            <option value="">-- Выберите регион --</option>
            <option value="aldemar">Столица Альдемар</option>
            <option value="duga">Имперская Дуга</option>
            <option value="hrebet">Драконий Хребет</option>
            <option value="prostory">Мировые просторы</option>
            <option value="wasteland">Пустоши Вейлара</option>
        </select>
        <div class="quest-list" id="questList"></div>
    </div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <span class="close" id="closeModal">&times;</span>
        <div class="portrait-large" id="modalPortrait"></div>
        <h2 id="modalName"></h2>
        <div class="subtitle" id="modalRole"></div>
        <div class="description" id="modalDescription"></div>
    </div>
</div>

<script>
const mainTabs = document.querySelectorAll('.main-tab');
const panels = {
    generator: document.getElementById('generatorPanel'),
    reference: document.getElementById('referencePanel'),
    quests: document.getElementById('questsPanel')
};

mainTabs.forEach(tab => {
    tab.addEventListener('click', () => {
        document.querySelectorAll('.main-tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const panelId = tab.dataset.panel;
        for (let [key, panel] of Object.entries(panels)) {
            panel.classList.toggle('active', key === panelId);
        }
    });
});

function createParticles() {
    const container = document.getElementById('particles');
    for (let i = 0; i < 30; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.animationDelay = Math.random() * 10 + 's';
        particle.style.animationDuration = 6 + Math.random() * 8 + 's';
        container.appendChild(particle);
    }
}
createParticles();

        divine: ["Исцеление","Благословение оружия","Изгнание нежити","Проповедь","Ритуалы очищения"],
        forbidden: ["Демонология","Проклятия","Некромантия","Жертвоприношения","Тайные обряды"],
        trade: ["Торговля","Оценка товаров","Бухгалтерия","Знание рынков","Переговоры","Контрабанда"]
    };
    const traits = ["Храбрый","Трусливый","Жестокий","Милосердный","Честный","Лживый","Жадный","Щедрый","Хитрый","Простодушный","Мрачный","Весёлый","Терпеливый","Вспыльчивый","Преданный","Эгоистичный","Любознательный","Равнодушный","Оптимистичный","Пессимистичный","Сдержанный","Импульсивный","Расчётливый","Мечтательный","Практичный","Надменный","Скромный","Властный","Покорный","Добросердечный","Злопамятный","Великодушный","Циничный","Наивный","Безрассудный","Осторожный","Фанатичный","Скептичный"];

    function getRandomItem(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
    function weightedRandom(items, weights) {
        let sum = 0, cumulative = [];
        for (let i = 0; i < weights.length; i++) { sum += weights[i]; cumulative[i] = sum; }
        let r = Math.random() * sum;
        for (let i = 0; i < cumulative.length; i++) { if (r < cumulative[i]) return items[i]; }
        return items[items.length - 1];
    }
    function generateFullName(raceKey) {
        let raceData = names[raceKey] || names.other;
        if (!raceData.male && !raceData.female) {
            return getRandomItem(raceData.first) + " " + getRandomItem(raceData.last);
        }
        let gender = Math.random() < 0.5 ? 'male' : 'female';
        return getRandomItem(raceData[gender]) + " " + getRandomItem(raceData.surnames || raceData.last || ["Безымянный"]);
    }

    window.generateCharacter = function() {
        const card = document.getElementById('characterCard');
        card.classList.remove('visible');
        setTimeout(() => {
            let region = getRandomItem(regions);
            let weights = raceWeights[region];
            let chosenRaceKey = weightedRandom(raceKeys, weights);
            let raceName = raceList[raceKeys.indexOf(chosenRaceKey)];
            let fullName = generateFullName(chosenRaceKey);

            let magicWeights = [...baseMagicWeights];
            if (region === "Столица Альдемар") { magicWeights[3] += 20; magicWeights[2] += 10; magicWeights[4] -= 5; }
            else if (region === "Имперская Дуга") { magicWeights[2] += 10; magicWeights[3] -= 2; }
            else if (region === "Мировые просторы") { magicWeights[2] += 10; magicWeights[4] += 10; magicWeights[3] -= 3; }
            else if (region === "Драконий Хребет") { magicWeights[4] += 15; magicWeights[1] -= 5; magicWeights[3] -= 3; }
            else if (region === "Пустоши Вейлара") { magicWeights[4] += 15; magicWeights[0] += 5; magicWeights[3] -= 3; }
            if (chosenRaceKey === "orc") { magicWeights[1] -= 15; magicWeights[2] -= 10; magicWeights[3] -= 5; }
            if (chosenRaceKey === "fey") { magicWeights[2] -= 3; magicWeights[3] -= 5; magicWeights[1] += 10; }
            if (chosenRaceKey === "dwarf") { magicWeights[2] -= 3; magicWeights[3] -= 5; magicWeights[1] += 5; }
            if (chosenRaceKey === "elf") { magicWeights[4] -= 5; magicWeights[2] += 5; }
            magicWeights = magicWeights.map(w => w < 0 ? 0 : w);
            let magicType = weightedRandom(magicTypes, magicWeights);

            let affWeights = [...baseAffiliationWeights];
            if (region === "Столица Альдемар" || region === "Имперская Дуга") {
                affWeights[2] += 10; affWeights[3] += (region==="Столица Альдемар"?15:3);
                affWeights[4] += (region==="Столица Альдемар"?10:3); affWeights[5] -= 3; affWeights[6] += 5;
            } else {
                affWeights[2] = 0; affWeights[3] = 0;
                if (region === "Драконий Хребет") affWeights[4] = 1;
                if (region === "Мировые просторы" || region === "Пустоши Вейлара") affWeights[5] += 12;
                affWeights[6] += 3;
            }
            if (chosenRaceKey !== "human") { affWeights[2] = Math.floor(affWeights[2]*0.2); affWeights[4] = 0; }
            if (chosenRaceKey === "orc") affWeights[6] = Math.floor(affWeights[6]*0.25);
            if (chosenRaceKey === "fey") affWeights[3] = Math.floor(affWeights[3]*0.3);
            if (magicType === "Магическая Академия") affWeights[3] += 10;
            else if (magicType === "Школа магии") affWeights[3] += 3;
            if (magicType === "Запрещённая") affWeights[5] += 15;
            affWeights = affWeights.map(w => w < 0 ? 0 : w);
            let affiliation = weightedRandom(affiliationsList, affWeights);

            let pools = [];
            if (affiliation === "Наёмник" || (affiliation === "Вольный" && region.includes("Пустоши"))) pools.push("combat");
            if (magicType === "Магическая Академия" || magicType === "Школа магии" || magicType === "Базовая") pools.push("magic");
            if (magicType === "Запрещённая" || affiliation === "Культ") pools.push("forbidden");
            if (affiliation === "Церковь") pools.push("divine");
            if (affiliation === "Вольный" && (region === "Мировые просторы" || region === "Драконий Хребет")) pools.push("wild");
            if (affiliation === "Великий дом") pools.push("social");
            if (affiliation === "Купец") pools.push("trade");
            if (chosenRaceKey === "dwarf") { pools.push("combat","magic","trade"); }
            if (chosenRaceKey === "elf") { pools.push("magic","wild"); }
            if (chosenRaceKey === "orc") { pools.push("combat","wild"); }
            if (chosenRaceKey === "fey") { pools.push("stealth","magic"); }
            pools.push("social","stealth");
            pools = [...new Set(pools)];
            let skillCount = Math.random() < 0.5 ? 2 : 3;
            let allPossible = pools.flatMap(p => skillPools[p] || []);
            let shuffled = allPossible.sort(() => Math.random() - 0.5);
            let selectedSkills = [...new Set(shuffled)].slice(0, skillCount);

            let trait = getRandomItem(traits);
            let spawn = getRandomItem(regions);

            document.getElementById('fio').textContent = fullName;
            document.getElementById('origin').textContent = region;
            document.getElementById('race').textContent = raceName;
            document.getElementById('magic').textContent = magicType;
            document.getElementById('affiliation').textContent = affiliation;
            document.getElementById('skills').textContent = selectedSkills.join(', ');
            document.getElementById('character').textContent = trait;
            document.getElementById('spawnLocation').textContent = spawn;

            card.classList.add('visible');
        }, 150);
    };
    window.onload = () => { generateCharacter(); };
})();

        }).join('');
        document.querySelectorAll('.ref-card').forEach(card => {
            card.addEventListener('click', () => {
                const d = card.dataset;
                const modalPortrait = document.getElementById('modalPortrait');
                if (d.icon && d.icon.startsWith('http')) {
                    modalPortrait.innerHTML = '<img src="' + d.icon + '" alt="" loading="lazy" width="90" height="90">';
                } else {
                    modalPortrait.innerHTML = '<span>' + d.name.charAt(0) + '</span>';
                }
                document.getElementById('modalName').textContent = d.name;
                document.getElementById('modalRole').textContent = d.role;
                document.getElementById('modalDescription').textContent = d.desc;
                modalOverlay.classList.add('open');
            });
        });
    }

    sectionTabBar.addEventListener('click', (e) => {
        if (e.target.classList.contains('section-tab')) {
            document.querySelectorAll('.section-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            currentSection = e.target.dataset.section;
            currentTab = charactersBySection[currentSection].tabs[0].id;
            renderTabs(currentSection);
            renderCards();
        }
    });

    document.getElementById('closeModal').addEventListener('click', () => modalOverlay.classList.remove('open'));
    modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) modalOverlay.classList.remove('open'); });

    renderTabs(currentSection);
    renderCards();
})();
